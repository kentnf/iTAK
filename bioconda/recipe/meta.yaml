{% set version = "2.0.5" %}

package:
  name: itak
  version: {{ version }}

source:
  url: https://github.com/kentnf/iTAK/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 916e30535fd26d99fc852a758fdc45739c3e4e7510e5db1c58fe5851af396282

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=68
  run:
    - python >=3.8
    - biopython >=1.83
    - requests >=2.31.0
    - hmmer

test:
  commands:
    - itak --help
    - python -m itak db path --target

about:
  home: https://github.com/kentnf/iTAK
  summary: Plant transcription factor, transcriptional regulator, and protein kinase identifier and classifier
  license: MIT
  doc_url: https://github.com/kentnf/iTAK/wiki
  dev_url: https://github.com/kentnf/iTAK

extra:
  recipe-maintainers:
    - kentnf
